<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="AUTO ELITE — New & used car export catalog. Browse vehicles and contact us via WhatsApp or email."
    />
    <title>AUTO ELITE · 汽车电子目录 Car Catalog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mozilla+Headline:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f2a43'/%3E%3Ctext x='16' y='22' font-size='16' text-anchor='middle' fill='%23f5b942' font-family='Arial' font-weight='bold'%3EA%3C/text%3E%3C/svg%3E" />
  </head>
  <body>
    <script>
      // 首屏前应用主题，避免刷新闪烁
      ;(function () {
        try {
          var t = localStorage.getItem('theme')
          var dark =
            t === 'dark' ||
            ((!t || t === 'system') && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', dark)
        } catch (e) {}
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
